name: Pages

# Deploys the standalone showcase page (showcase/ — the "Luna TV" capability demo) to GitHub
# Pages. Pure static upload, no build step: fonts are vendored in showcase/fonts/, and demo
# videos are optional (a channel with no video shows the page's built-in test-card state).

on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase
      - id: deployment
        uses: actions/deploy-pages@v4

name: Release

# v0.38.6 (Initiative 28): build the desktop installers in the cloud and attach them to a GitHub
# Release. Fires ONLY when a `v*` tag is pushed (the supervised release step) or on a manual dispatch
# — never on an ordinary push. Two native runners so each installer is built on its own OS:
#   • windows-latest → luna-server.exe + NSIS `Luna Setup <v>.exe`
#   • macos-latest   → luna-server (arm64) + an UNSIGNED `Luna-<v>-arm64.dmg`
# Neither is code-signed: Windows SmartScreen ("unknown publisher") and macOS Gatekeeper (right-click
# → Open / clear the quarantine attr) will warn. The installers carry NO secrets — keys are entered
# in the wizard and live in the user's own userData, never in the bundle.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write # softprops/action-gh-release creates the Release + uploads assets

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web bundle
        run: bun run --cwd packages/web build
      - name: Compile the Windows sidecar
        run: bun run --cwd packages/desktop compile:server:win
      - name: Package (NSIS installer + unpacked dir)
        run: bun run --cwd packages/desktop pack:win
      - name: Attach the installer to the Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          fail_on_unmatched_files: true
          files: packages/desktop/release/*.exe
          body: |
            Desktop installers for Luna (Initiative 28 — Windows desktop, code-complete).

            **Windows** — `Luna Setup <version>.exe` (x64, unsigned). SmartScreen will warn
            "unknown publisher": click **More info → Run anyway**.
            **macOS** — `Luna-<version>-arm64.dmg` (Apple Silicon, unsigned). Right-click the app
            → **Open** the first time (or `xattr -d com.apple.quarantine /Applications/Luna.app`).

            The installers contain no API keys — you enter those in the setup wizard on first run.
            Marked pre-release: Windows real-machine acceptance is still pending.

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web bundle
        run: bun run --cwd packages/web build
      - name: Compile the macOS sidecar
        run: bun run --cwd packages/desktop compile:server
      - name: Package (unsigned dmg, arm64)
        run: bun run --cwd packages/desktop pack:mac
      - name: Attach the dmg to the Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          fail_on_unmatched_files: true
          files: packages/desktop/release/*.dmg

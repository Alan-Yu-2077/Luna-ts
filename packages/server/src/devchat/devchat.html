<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna · Dev Chat</title>
    <style>
      :root {
        --bg: #14110f; --panel: #1d1916; --line: #2c2622; --text: #e8e2da;
        --muted: #998d80; --accent: #d98c5f; --user: #2a3441; --luna: #241f1b;
        --tool: #c98a3c; --dream: #8a7bc8; --err: #c25b5b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 15px/1.6 ui-sans-serif, system-ui, "PingFang SC", sans-serif;
        background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
      }
      header {
        padding: 10px 16px; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; gap: 12px;
      }
      header h1 { margin: 0; font-size: 15px; font-weight: 600; }
      header .accent { color: var(--accent); }
      #status { font-size: 12px; color: var(--muted); flex: 1; }
      button {
        background: var(--panel); color: var(--text); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px;
      }
      button:hover { border-color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: default; }
      #log { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 76%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-break: break-word; }
      .msg.user { background: var(--user); align-self: flex-end; border-bottom-right-radius: 4px; }
      .msg.luna { background: var(--luna); align-self: flex-start; border: 1px solid var(--line); border-bottom-left-radius: 4px; }
      .chip {
        align-self: flex-start; font-size: 12px; color: var(--muted);
        border: 1px dashed var(--line); border-radius: 10px; padding: 3px 10px;
      }
      .chip.tool { color: var(--tool); border-color: var(--tool); }
      .chip.dream { color: var(--dream); border-color: var(--dream); }
      .chip.err { color: var(--err); border-color: var(--err); }
      footer { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; gap: 10px; }
      #input {
        flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--line);
        border-radius: 10px; padding: 10px 14px; font: inherit; outline: none;
      }
      #input:focus { border-color: var(--accent); }
      a { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Luna <span class="accent">·</span> Dev Chat</h1>
      <span id="status">connecting…</span>
      <a href="/_trace" target="_blank">trace ↗</a>
      <button id="dreamBtn">🌙 Dream</button>
      <button id="wakeBtn" disabled>☀️ Wake</button>
      <button id="proactiveBtn">🌱 Proactive</button>
    </header>
    <div id="log"></div>
    <footer>
      <input id="input" placeholder="Say something to Luna… (Enter to send)" autocomplete="off" />
      <button id="sendBtn">Send</button>
    </footer>
    <script>
      const log = document.getElementById('log');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const dreamBtn = document.getElementById('dreamBtn');
      const wakeBtn = document.getElementById('wakeBtn');
      const proactiveBtn = document.getElementById('proactiveBtn');
      const statusEl = document.getElementById('status');

      let ws = null;
      let currentBubble = null;
      // streaming message-tool bubbles, keyed by call_id (v0.6.2)
      const msgBubbles = new Map();
      let msgCountThisTurn = 0;

      function ensureMsgBubble(callId) {
        let b = msgBubbles.get(callId);
        if (!b) {
          b = el('msg luna', '');
          msgBubbles.set(callId, b);
          msgCountThisTurn += 1;
        }
        return b;
      }

      function revealSegments(bubble, segments) {
        // paced reveal only when nothing was streamed live (degraded path)
        let i = 0;
        function step() {
          if (i >= segments.length) return;
          bubble.textContent += (i > 0 ? ' ' : '') + segments[i].text;
          log.scrollTop = log.scrollHeight;
          i += 1;
          if (i < segments.length) setTimeout(step, segments[i].delay_ms);
        }
        step();
      }

      function el(cls, text) {
        const d = document.createElement('div');
        d.className = cls;
        d.textContent = text;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
        return d;
      }

      function setDreaming(on, step) {
        dreamBtn.disabled = on;
        wakeBtn.disabled = !on || (step !== 'finished_idle');
        input.disabled = on;
        sendBtn.disabled = on;
        statusEl.textContent = on
          ? (step === 'finished_idle' ? 'Luna finished dreaming — waiting for you to wake her' : 'Luna is dreaming… (' + (step || 'preparing') + ')')
          : 'connected';
      }

      function connect() {
        ws = new WebSocket(`ws://${location.host}`);
        ws.onopen = () => { statusEl.textContent = 'connected'; };
        ws.onclose = () => { statusEl.textContent = 'disconnected — retrying…'; setTimeout(connect, 1500); };
        ws.onmessage = (e) => {
          const ev = JSON.parse(e.data);
          switch (ev.type) {
            case 'turn.started':
              currentBubble = null;
              msgCountThisTurn = 0;
              break;
            case 'reply.token':
              if (!currentBubble) currentBubble = el('msg luna', '');
              currentBubble.textContent += ev.text;
              log.scrollTop = log.scrollHeight;
              break;
            case 'turn.result':
              if (!currentBubble && msgCountThisTurn === 0 && ev.text) {
                el('msg luna', ev.text);
              }
              currentBubble = null;
              break;
            case 'tool.started':
              if (ev.tool_name === 'message') { ensureMsgBubble(ev.call_id); break; }
              el('chip tool', '🔧 ' + ev.tool_name + ' …');
              break;
            case 'tool.progress':
              if (ev.tool_name === 'message' && ev.payload && typeof ev.payload.text_delta === 'string') {
                ensureMsgBubble(ev.call_id).textContent += ev.payload.text_delta;
                log.scrollTop = log.scrollHeight;
              }
              break;
            case 'tool.finished': {
              const bubble = msgBubbles.get(ev.call_id);
              if (bubble) {
                msgBubbles.delete(ev.call_id);
                if (ev.result.kind === 'ok') {
                  const d = ev.result.data;
                  if (bubble.textContent.length === 0 && d.segments && d.segments.length) {
                    revealSegments(bubble, d.segments);
                  } else {
                    bubble.textContent = d.text;
                  }
                  if (d.expression) el('chip', '🎭 ' + d.expression + (d.emotion != null ? ' · ' + d.emotion : ''));
                } else {
                  bubble.remove();
                  msgCountThisTurn -= 1;
                  el('chip err', '💬 re-say: ' + String(ev.result.message || '').slice(0, 80));
                }
                break;
              }
              el('chip tool', '🔧 ' + (ev.result.kind === 'ok' ? (ev.result.summary || 'done') : 'Failed: ' + ev.result.message));
              break;
            }
            case 'dream.step':
              el('chip dream', '🌙 ' + ev.step + ' → ' + ev.status + (ev.detail ? ' · ' + ev.detail : ''));
              setDreaming(true, ev.step);
              break;
            case 'dream.status':
              setDreaming(ev.is_dreaming, ev.current_step);
              if (!ev.is_dreaming) el('chip dream', '☀️ Luna woke up');
              break;
            case 'proactive.started':
              currentBubble = null; msgCountThisTurn = 0;
              el('chip dream', '🌱 Luna stirred on her own…');
              break;
            case 'proactive.finished':
              if (!ev.spoke) el('chip', '🌱 (she quietly did something, without speaking)');
              currentBubble = null;
              break;
            case 'error':
              el('chip err', '⚠ ' + ev.code + ': ' + ev.message);
              if (ev.code === 'dreaming') setDreaming(true, null);
              break;
          }
        };
      }

      function send() {
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== 1) return;
        el('msg user', text);
        ws.send(JSON.stringify({ type: 'chat.send', text }));
        input.value = '';
      }

      sendBtn.onclick = send;
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
      dreamBtn.onclick = () => { ws && ws.send(JSON.stringify({ type: 'dream.enter' })); };
      wakeBtn.onclick = () => { ws && ws.send(JSON.stringify({ type: 'dream.wake' })); };
      proactiveBtn.onclick = () => { ws && ws.send(JSON.stringify({ type: 'proactive.fire' })); };

      connect();
    </script>
  </body>
</html>

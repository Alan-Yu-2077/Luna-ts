<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna · workspace</title>
    <style>
      :root {
        --bg: #1e1e1e;
        --side: #252526;
        --bar: #323233;
        --line: #383838;
        --fg: #d4d4d4;
        --dim: #858585;
        --accent: #569cd6;
        --accent2: #4ec9b0;
        --pink: #c586c0;
        --warn: #f48771;
        --sel: #094771;
        --rowsel: #2a2d2e;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 12px/1.5 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
        display: flex;
        flex-direction: column;
      }
      .titlebar {
        height: 36px;
        background: var(--bar);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        flex: 0 0 auto;
      }
      .titlebar .logo { color: var(--pink); font-weight: 600; }
      .titlebar .status { color: var(--dim); }
      .titlebar .spacer { flex: 1; }
      .btn {
        background: #0e639c;
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 4px 12px;
        cursor: pointer;
        font: inherit;
      }
      .btn:hover { background: #1177bb; }
      .btn.ghost { background: transparent; border: 1px solid var(--line); color: var(--fg); }
      .btn.ghost:hover { border-color: var(--accent); }
      .btn.danger { background: #6b2020; }
      .btn.danger:hover { background: #a13030; }
      .shell { flex: 1; display: flex; min-height: 0; }
      .sidebar {
        width: 240px;
        flex: 0 0 auto;
        background: var(--side);
        border-right: 1px solid var(--line);
        overflow-y: auto;
      }
      .sidebar h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--dim);
        padding: 10px 14px 6px;
        margin: 0;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 14px;
        cursor: pointer;
        white-space: nowrap;
      }
      .tab:hover { background: var(--rowsel); }
      .tab.active { background: var(--sel); }
      .tab .ic { color: var(--accent2); }
      .tab .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; }
      .tab .ct {
        color: var(--dim);
        background: #00000033;
        border-radius: 10px;
        padding: 0 7px;
        font-size: 11px;
      }
      .editor { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .editor .ehead {
        height: 34px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
        background: #252526;
      }
      .editor .ehead .tname { color: var(--accent); font-weight: 600; }
      .editor .ehead .hint { color: var(--dim); font-size: 11px; }
      .gridwrap { flex: 1; overflow: auto; }
      table { border-collapse: collapse; width: 100%; }
      th, td {
        text-align: left;
        padding: 4px 9px;
        border-bottom: 1px solid var(--line);
        border-right: 1px solid var(--line);
        vertical-align: top;
        max-width: 460px;
        overflow: hidden;
        white-space: pre-wrap;
        word-break: break-word;
      }
      th {
        position: sticky;
        top: 0;
        background: var(--bar);
        color: var(--accent2);
        font-weight: 600;
        z-index: 1;
        white-space: nowrap;
      }
      tr:hover td { background: var(--rowsel); }
      .cellc { white-space: pre-wrap; word-break: break-word; }
      .cellc.editable { cursor: text; }
      .cellc.editable:focus { outline: 1px solid var(--accent); background: #04395e; border-radius: 2px; }
      .cellc.empty { color: #5a5a5a; font-style: italic; }
      /* long values (raw_json, payloads, full logs) collapse to ~3 lines until expanded */
      .cellc.clamp { max-height: 3.4em; overflow: hidden; }
      .cellc.clamp.open { max-height: none; }
      .exp { float: right; margin-left: 6px; cursor: pointer; color: var(--accent); user-select: none; font-size: 11px; line-height: 1.5; }
      .exp:hover { color: var(--fg); }
      td.rowact { width: 28px; text-align: center; border-right: 1px solid var(--line); }
      .del { color: var(--warn); cursor: pointer; opacity: 0.5; }
      tr:hover .del { opacity: 1; }
      .nodata { padding: 20px; color: var(--dim); }
      .toast {
        position: fixed;
        bottom: 14px;
        right: 14px;
        background: #333;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 8px 14px;
        color: var(--fg);
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .toast.on { opacity: 1; }
      /* soul editor (v0.31.0) — the owner-maintained persona document */
      .soulnav .ic { color: var(--pink); }
      .soulform { padding: 14px 16px; max-width: 900px; }
      .soulform .sfld { margin-bottom: 16px; }
      .soulform label { display: block; color: var(--accent2); margin-bottom: 4px; font-weight: 600; }
      .soulform label .dim { color: var(--dim); font-weight: 400; }
      .soulform textarea {
        width: 100%;
        background: #1a1a1a;
        color: var(--fg);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 8px 10px;
        font: inherit;
        resize: vertical;
        line-height: 1.5;
      }
      .soulform textarea:focus { outline: none; border-color: var(--accent); }
      .soulform textarea#s_fixed { min-height: 260px; }
      .soulform textarea#s_self, .soulform textarea#s_bond { min-height: 90px; }
      .soulform textarea:disabled { opacity: 0.6; cursor: not-allowed; }
      .soulform .sactions { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
      .soulform .sactions .hint { color: var(--dim); }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <span class="logo">🌙 Luna workspace</span>
      <span class="status" id="status">loading…</span>
      <span class="spacer"></span>
      <label class="status">rows
        <select id="limit" class="btn ghost" style="padding:2px 6px">
          <option>50</option><option selected>100</option><option>300</option><option>1000</option>
        </select>
      </label>
      <button class="btn ghost" id="refresh">⟳ Refresh</button>
      <button class="btn danger" id="reset">🗑 Reset DB</button>
    </div>
    <div class="shell">
      <div class="sidebar">
        <h2>Soul</h2>
        <div class="tab soulnav" id="soulnav"><span class="ic">🪶</span><span class="nm">soul · 人格</span></div>
        <h2>Skills</h2>
        <div class="tab soulnav" id="skillsnav"><span class="ic">🛠</span><span class="nm">skills · 技能</span></div>
        <h2>Tables</h2>
        <div id="tabs"></div>
      </div>
      <div class="editor">
        <div class="ehead">
          <span class="tname" id="curname">—</span>
          <span class="hint" id="curhint"></span>
          <span class="spacer" style="flex:1"></span>
          <span class="hint">点击编辑 · ⤢ 展开长内容 · 🗑 删行</span>
        </div>
        <div class="gridwrap" id="grid"><div class="nodata">loading…</div></div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      const $ = (id) => document.getElementById(id);
      let DATA = { tables: [] };
      let current = null;
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      let toastTimer = null;
      function toast(msg) {
        const t = $('toast');
        t.textContent = msg;
        t.classList.add('on');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('on'), 1800);
      }

      async function load(keep) {
        const res = await fetch('/_workspace/api/all?limit=' + $('limit').value);
        DATA = await res.json();
        if (!DATA.enabled) { $('status').textContent = 'persistence off — no DB'; return; }
        const total = DATA.tables.reduce((a, t) => a + Math.max(0, t.count), 0);
        $('status').textContent = DATA.tables.length + ' tables · ' + total + ' rows';
        renderTabs();
        const pick = keep && DATA.tables.find((t) => t.name === current) ? current : (DATA.tables[0] && DATA.tables[0].name);
        if (pick) select(pick);
      }
      function renderTabs() {
        $('tabs').innerHTML = DATA.tables.map((t) =>
          '<div class="tab' + (t.name === current ? ' active' : '') + '" data-n="' + esc(t.name) + '">' +
          '<span class="ic">▤</span><span class="nm">' + esc(t.name) + '</span>' +
          '<span class="ct">' + (t.count < 0 ? '!' : t.count) + '</span></div>'
        ).join('');
        $('tabs').querySelectorAll('.tab').forEach((el) => el.addEventListener('click', () => select(el.dataset.n)));
      }
      // A cell. Long values (raw_json / payloads / full logs) render collapsed to a
      // few lines with a ⤢ toggle so they don't flood the grid.
      function cellHtml(rid, col, v, editable) {
        const isNull = v === null || v === undefined;
        const disp = isNull ? '∅' : (typeof v === 'object' ? JSON.stringify(v) : String(v));
        const long = !isNull && (disp.length > 140 || disp.indexOf('\n') >= 0);
        const cls = 'cellc' + (isNull ? ' empty' : '') + (editable ? ' editable' : '') + (long ? ' clamp' : '');
        const ce = editable ? ' contenteditable="true"' : '';
        const toggle = long ? '<span class="exp" title="展开 / 折叠">⤢</span>' : '';
        return '<td>' + toggle + '<div class="' + cls + '" data-rid="' + rid + '" data-col="' + esc(col) + '"' + ce + '>' + esc(disp) + '</div></td>';
      }
      function bindExpand() {
        $('grid').querySelectorAll('.exp').forEach((x) => x.addEventListener('click', () => {
          const cell = x.parentElement.querySelector('.cellc');
          if (cell) cell.classList.toggle('open');
        }));
      }
      function select(name) {
        current = name;
        $('soulnav').classList.remove('active');
        $('skillsnav').classList.remove('active');
        renderTabs();
        const t = DATA.tables.find((x) => x.name === name);
        if (!t) return;
        $('curname').textContent = t.name;
        $('curhint').textContent = (t.count < 0 ? (t.error || 'error') : t.count + ' rows') + (t.editable ? '' : ' · read-only');
        if (t.error) { $('grid').innerHTML = '<div class="nodata">' + esc(t.error) + '</div>'; return; }
        if (!t.rows.length) { $('grid').innerHTML = '<div class="nodata">— empty —</div>'; return; }
        const cols = (t.columns.length ? t.columns : Object.keys(t.rows[0])).filter((c) => c !== '__rowid');
        const thead = '<tr>' + (t.editable ? '<th></th>' : '') + cols.map((c) => '<th>' + esc(c) + '</th>').join('') + '</tr>';
        const body = t.rows.map((r) => {
          const rid = r.__rowid;
          const act = t.editable ? '<td class="rowact"><span class="del" title="delete" data-rid="' + rid + '">✕</span></td>' : '';
          const cells = cols.map((c) => cellHtml(rid, c, r[c], t.editable)).join('');
          return '<tr>' + act + cells + '</tr>';
        }).join('');
        $('grid').innerHTML = '<table>' + thead + body + '</table>';
        bindExpand();
        if (t.editable) wireEdits(t.name);
      }
      function wireEdits(table) {
        $('grid').querySelectorAll('.cellc.editable').forEach((cell) => {
          const orig = cell.textContent;
          cell.addEventListener('focus', () => {
            if (cell.classList.contains('empty')) { cell.textContent = ''; cell.classList.remove('empty'); }
            cell.classList.add('open'); // editing always shows the full value
          });
          cell.addEventListener('blur', async () => {
            const val = cell.textContent;
            if (val === orig) return;
            const r = await fetch('/_workspace/api/edit', {
              method: 'POST', headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ action: 'update', table, rowid: Number(cell.dataset.rid), column: cell.dataset.col, value: val }),
            }).then((x) => x.json());
            toast(r.ok ? 'saved ' + table + '.' + cell.dataset.col : 'error: ' + (r.error || '?'));
          });
        });
        $('grid').querySelectorAll('.del').forEach((d) => d.addEventListener('click', async () => {
          if (!confirm('删除这一行？')) return;
          const r = await fetch('/_workspace/api/edit', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ action: 'delete', table, rowid: Number(d.dataset.rid) }),
          }).then((x) => x.json());
          toast(r.ok ? 'deleted' : 'error: ' + (r.error || '?'));
          if (r.ok) load(true);
        }));
      }
      // Soul editor (v0.31.0): the owner-maintained persona document. Read is open; the Save/Reset
      // actions post to the LUNA_DEV_TOOLS-gated routes (writable flag from the server).
      async function selectSoul() {
        current = '__soul__';
        renderTabs();
        $('soulnav').classList.add('active');
        $('curname').textContent = '🪶 Soul · 人格';
        $('curhint').textContent = 'owner-maintained · Luna 不能自改 fixed core';
        $('grid').innerHTML = '<div class="nodata">loading…</div>';
        const res = await fetch('/_workspace/api/soul').then((x) => x.json()).catch(() => null);
        if (!res || !res.enabled) { $('grid').innerHTML = '<div class="nodata">persistence off — no DB</div>'; return; }
        const s = res.soul;
        const ro = s.writable ? '' : ' disabled';
        $('grid').innerHTML =
          '<div class="soulform">' +
          '<div class="sfld"><label>Fixed core <span class="dim">— 你维护；Luna 不能自改；default.md 只是首次种子</span></label>' +
          '<textarea id="s_fixed"' + ro + '></textarea></div>' +
          '<div class="sfld"><label>Who I am becoming <span class="dim">— evolving_self（梦境自写，你也可改）</span></label>' +
          '<textarea id="s_self"' + ro + '></textarea></div>' +
          '<div class="sfld"><label>The bond, right now <span class="dim">— evolving_bond</span></label>' +
          '<textarea id="s_bond"' + ro + '></textarea></div>' +
          '<div class="sactions">' +
          (s.writable
            ? '<button class="btn" id="s_save">💾 Save soul</button><button class="btn ghost" id="s_reseed">↺ Reset fixed core → default.md</button>'
            : '') +
          '<span class="hint" id="s_meta"></span></div></div>';
        $('s_fixed').value = s.fixed_text || '';
        $('s_self').value = s.evolving_self || '';
        $('s_bond').value = s.evolving_bond || '';
        $('s_meta').textContent = s.writable
          ? (s.updated_ms ? 'last change ' + new Date(s.updated_ms).toLocaleString() : 'never edited')
          : '只读 · set LUNA_DEV_TOOLS=1 to edit';
        if (s.writable) wireSoul();
      }
      function wireSoul() {
        $('s_save').addEventListener('click', async () => {
          const r = await fetch('/_workspace/api/soul', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ fixed: $('s_fixed').value, self: $('s_self').value, bond: $('s_bond').value }),
          }).then((x) => x.json());
          toast(r.ok ? 'soul saved · 生效于下一轮对话' : 'error: ' + (r.error || '?'));
        });
        $('s_reseed').addEventListener('click', async () => {
          if (!confirm('把 fixed core 重置回 persona/default.md？你当前对固定内核的自定义会被覆盖。')) return;
          const r = await fetch('/_workspace/api/soul/reseed', {
            method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ confirm: true }),
          }).then((x) => x.json());
          if (r.ok) { $('s_fixed').value = r.soul.fixed_text || ''; toast('fixed core 已重置'); }
          else toast('error: ' + (r.error || '?'));
        });
      }
      // Skills panel (v0.32.3): the whole library incl. deprecated + provenance +
      // usage; writes go through the audited store routes (save/deprecate/restore).
      async function selectSkills() {
        current = '__skills__';
        renderTabs();
        $('soulnav').classList.remove('active');
        $('skillsnav').classList.add('active');
        $('curname').textContent = '🛠 Skills · 技能库';
        $('curhint').textContent = 'saved=醒态验证 · dream=梦蒸馏 · owner=你 · 全部可审计撤销';
        $('grid').innerHTML = '<div class="nodata">loading…</div>';
        const res = await fetch('/_workspace/api/skills').then((x) => x.json()).catch(() => null);
        if (!res || !res.enabled) { $('grid').innerHTML = '<div class="nodata">persistence off — no DB</div>'; return; }
        const w = res.writable;
        const rows = res.skills.map((s) => {
          const dead = s.deprecated_ms > 0;
          const badge = '<span class="ct">' + esc(s.source) + '</span>';
          const use = '<span class="ct">' + s.used_count + '×</span>';
          const btns = w
            ? (dead
                ? '<button class="btn ghost sk-restore" data-n="' + esc(s.name) + '">↩ restore</button>'
                : '<button class="btn ghost sk-dep" data-n="' + esc(s.name) + '">🗑 deprecate</button>')
            : '';
          return (
            '<div class="sfld" style="border:1px solid var(--line);border-radius:4px;padding:10px 12px">' +
            '<label style="' + (dead ? 'text-decoration:line-through;opacity:.6' : '') + '">' +
            esc(s.name) + ' ' + badge + ' ' + use + '</label>' +
            '<div class="hint" style="margin-bottom:6px">' + esc(s.description) + '</div>' +
            '<textarea data-n="' + esc(s.name) + '" class="sk-body" ' + (w && !dead ? '' : 'disabled') + ' style="min-height:80px">' + esc(s.body) + '</textarea>' +
            '<div class="sactions">' + (w && !dead ? '<button class="btn sk-save" data-n="' + esc(s.name) + '">💾 Save</button>' : '') + btns + '</div>' +
            '</div>'
          );
        });
        $('grid').innerHTML =
          '<div class="soulform">' +
          (rows.length ? rows.join('') : '<div class="nodata">— library empty —</div>') +
          (w ? '' : '<div class="hint">只读 · set LUNA_DEV_TOOLS=1 to edit</div>') +
          '</div>';
        if (!w) return;
        const post = (b) => fetch('/_workspace/api/skills', {
          method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(b),
        }).then((x) => x.json());
        $('grid').querySelectorAll('.sk-save').forEach((btn) => btn.addEventListener('click', async () => {
          const name = btn.dataset.n;
          const sk = res.skills.find((x) => x.name === name);
          const bodyEl = $('grid').querySelector('.sk-body[data-n="' + CSS.escape(name) + '"]');
          const r = await post({ action: 'save', name, description: sk.description, body: bodyEl.value });
          toast(r.ok ? 'saved · 生效于下一轮' : 'error: ' + (r.error || '?'));
        }));
        $('grid').querySelectorAll('.sk-dep').forEach((btn) => btn.addEventListener('click', async () => {
          if (!confirm('弃用这个技能？(可 restore 撤销)')) return;
          const r = await post({ action: 'deprecate', name: btn.dataset.n });
          toast(r.ok ? 'deprecated' : 'error: ' + (r.error || '?'));
          if (r.ok) selectSkills();
        }));
        $('grid').querySelectorAll('.sk-restore').forEach((btn) => btn.addEventListener('click', async () => {
          const r = await post({ action: 'restore', name: btn.dataset.n });
          toast(r.ok ? 'restored' : 'error: ' + (r.error || '?'));
          if (r.ok) selectSkills();
        }));
      }
      $('skillsnav').addEventListener('click', selectSkills);
      $('soulnav').addEventListener('click', selectSoul);
      $('refresh').addEventListener('click', () => load(true));
      $('limit').addEventListener('change', () => load(true));
      $('reset').addEventListener('click', async () => {
        if (!confirm('一键重置：清空对话 / L2 / L3 / traces / 会话（保留人格与梦状态）。不可撤销，确定？')) return;
        const r = await fetch('/_workspace/api/reset', {
          method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ confirm: true }),
        }).then((x) => x.json());
        toast(r.ok ? 'reset done' : 'error: ' + (r.error || '?'));
        load(true);
      });
      load(false);
    </script>
  </body>
</html>
